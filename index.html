<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dr. Ayaz H. Shaikh — Diabetologist & Sexologist | Karachi</title>
<meta name="description" content="Dr. Ayaz H. Shaikh, MBBS, MBA, MCPS (DOW). Consultant Diabetologist & Sexologist based in Karachi." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--color-bg:#f7f6f2;--color-surface:#ffffff;--color-surface-2:#f3f0ec;--color-text:#1a2a3a;--color-text-muted:#5b6b7b;--color-primary:#0b3d6b;--color-primary-hover:#072a4d;--color-accent:#c8a04a;--color-border:rgba(11,61,107,.12);--shadow-sm:0 1px 2px rgba(11,61,107,.06);--shadow-md:0 6px 18px rgba(11,61,107,.10);--shadow-lg:0 16px 40px rgba(11,61,107,.14);--radius-md:10px;--radius-lg:16px;--radius-full:9999px;--font-display:'Playfair Display',Georgia,serif;--font-body:'Work Sans','Helvetica Neue',sans-serif;--space-4:1rem;--space-6:1.5rem;--space-8:2rem;--space-12:3rem;--space-16:4rem;--space-24:6rem;--content-wide:1200px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);font-size:16px;line-height:1.65;color:var(--color-text);background:var(--color-bg)}
img{display:block;max-width:100%;height:auto}
a{color:var(--color-primary);text-decoration:none}
h1,h2,h3{font-family:var(--font-display);color:var(--color-primary);line-height:1.2}
h1{font-size:clamp(2rem,4.5vw,3.25rem)}
h2{font-size:clamp(1.6rem,3vw,2.25rem);margin-bottom:var(--space-6)}
h3{font-size:1.25rem;margin-bottom:.5rem}
.container{max-width:var(--content-wide);margin-inline:auto;padding-inline:var(--space-6)}
.topbar{background:var(--color-primary);color:#fff;font-size:.85rem}
.topbar-inner{display:flex;flex-wrap:wrap;justify-content:space-between;gap:.75rem;padding:.6rem 1.5rem}
.topbar a{color:#fff}
header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--color-border)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) 0}
.brand{display:flex;align-items:center;gap:.7rem}
.brand-mark{width:42px;height:42px;border-radius:50%;background:var(--color-primary);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700}
.brand-text strong{display:block;font-family:var(--font-display);color:var(--color-primary)}
.brand-text small{color:var(--color-text-muted);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase}
.nav ul{display:flex;gap:1.5rem;list-style:none}
.nav ul a{color:var(--color-text);font-weight:500;font-size:.95rem}
.menu-btn{display:none;background:none;border:none;cursor:pointer;padding:.5rem}
.menu-btn span{display:block;width:24px;height:2px;background:var(--color-primary);margin:5px 0}
.hero{padding:var(--space-16) 0 var(--space-24);background:linear-gradient(135deg,#f7f6f2 0%,#eaf0f6 100%)}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:var(--space-12);align-items:center}
.eyebrow{display:inline-block;color:var(--color-accent);font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:.78rem;margin-bottom:var(--space-4)}
.hero h1 span{color:var(--color-accent);font-style:italic}
.hero p.lead{font-size:1.1rem;color:var(--color-text-muted);margin:var(--space-6) 0 var(--space-8)}
.cta-row{display:flex;flex-wrap:wrap;gap:var(--space-4)}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.6rem;border-radius:var(--radius-full);font-weight:600;font-size:.95rem;border:1px solid transparent;cursor:pointer}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-ghost{background:transparent;color:var(--color-primary);border-color:var(--color-primary)}
.hero-portrait img{width:min(300px,82%);aspect-ratio:4/5;object-fit:cover;object-position:center top;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);border:6px solid #fff}
section{padding:var(--space-24) 0}
.section-head{text-align:center;margin-bottom:var(--space-12)}
.section-head p{margin:0 auto;color:var(--color-text-muted)}
.about-grid,.clinic-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:var(--space-12)}
.about-card,.clinic,.enquiry-form{background:#fff;padding:var(--space-8);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--color-border)}
.qual-list{list-style:none;display:grid;gap:.75rem;margin-top:1rem}
.qual-list li{display:flex;gap:.6rem;align-items:flex-start;color:var(--color-text-muted)}
.qual-list li:before{content:"";flex-shrink:0;margin-top:.55rem;width:8px;height:8px;background:var(--color-accent);border-radius:50%}
.expertise{background:var(--color-surface-2)}
.expertise-grid,.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--space-6)}
.exp-card{background:#fff;border-radius:var(--radius-lg);padding:var(--space-6);border:1px solid var(--color-border)}
.ex
